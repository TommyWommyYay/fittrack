databases:
  - name: fittrack-db
    plan: free
    databaseName: fittrack
    user: fittrack

services:
  - type: web
    name: fittrack-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fittrack-db
          property: connectionString
